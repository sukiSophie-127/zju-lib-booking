# .github/workflows/book-seat.yml

name: 自动预约座位

# 允许您从 GitHub Actions 页面手动触发此工作流
on:
  workflow_dispatch:
    inputs:
      account:
        description: '账号/学号（注意：这里输入的不是 Secret）'
        required: true
        type: string

      password:
        description: '密码（注意：这里输入的不是 Secret；仅能在日志中进行 mask）'
        required: true
        type: string

      # (保持原有) 预约模式参数 (对应 main.py 的第4个参数 sys.argv[3])
      scope_mode:
        description: '预约模式 (0=仅二层排除指定座位, 1=仅二层含指定座位, 2=全部区域)'
        required: false
        default: '0'
        type: string

      # (保持原有) 刷新时间参数 (对应 main.py 的第5个参数 sys.argv[4])
      refresh_time:
        description: '刷新间隔时间 (秒)'
        required: false
        default: '1.0'
        type: string

jobs:
  book:
    # 使用最新的 Ubuntu 运行环境
    runs-on: ubuntu-latest

    steps:
      # 第1步：检出您的代码库
      # 这样 runner 才能访问到 main.py
      - name: 1. 检出代码
        uses: actions/checkout@v4

      # 第2步：设置 Python 3.11 环境
      - name: 2. 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 第3步：安装 main.py 所需的 Python 依赖库
      - name: 3. 安装 Python 依赖库
        run: |
          python -m pip install --upgrade pip
          # 安装脚本所需的三个关键库
          pip install httpx lxml pycryptodome

      # 第4步：运行预约脚本
      - name: 4. 运行预约脚本
        shell: bash
        env:
          ACCOUNT: ${{ inputs.account }}
          PASSWORD: ${{ inputs.password }}
          SCOPE_MODE: ${{ inputs.scope_mode }}
          REFRESH_TIME: ${{ inputs.refresh_time }}
        run: |
          # inputs 不是 secret：这里只能尽量避免在日志中泄露
          echo "::add-mask::$ACCOUNT"
          echo "::add-mask::$PASSWORD"

          # 用法: python3 main.py <学号> <密码> [模式] [刷新间隔]
          python3 main.py "$ACCOUNT" "$PASSWORD" "$SCOPE_MODE" "$REFRESH_TIME"